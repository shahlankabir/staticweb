[build]
  command = "hugo --gc --minify"
  publish = "public"

[build.environment] 
  HUGO_VERSION = "0.162.1"
  HUGO_ENV = "production"
  HUGO_EXTENDED = "true"
  HUGO_ENABLEGITINFO = "true"
	
[context.production.environment]
  HUGO_ENV = "production"
	
[context.deploy-preview.environment]
  HUGO_ENV = "staging"
